name: CI

# The trust gate, per CLAUDE.md: every PR runs the self-tests, which run
# validate.py against tests/fixtures/synthetic/.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Floor is 3.11 (pyproject requires-python); 3.13 is the dev-container
        # interpreter. Both are exercised so the templates aren't tied to one.
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install jq (only non-default dep used by the hooks)
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Run self-tests
        run: pytest tests/ -q
